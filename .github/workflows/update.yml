name: Update TOP100 Report

on:
  schedule:
    # 每个交易日（周一至五）北京时间 17:00 = UTC 09:00
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: pip install -r requirements.txt 2>&1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install WeStock CLI
        run: npm install -g westock-data-cli 2>&1 || echo "WeStock CLI install skipped"

      - name: Run report generator
        run: |
          python generate_report.py 2>&1 || \
          (echo "First attempt failed, retrying in 30s..." && sleep 30 && python generate_report.py 2>&1)
        env:
          NO_PROXY: '*'
          PYTHONUNBUFFERED: '1'

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "update: $(date +%Y-%m-%d)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
